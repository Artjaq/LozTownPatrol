<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loz Town Patrol — Accueil</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header-glow" id="main-header">
    <div class="container nav">
      <a href="index.html">
        <img src="image/Text only white SVG.svg" class="logo" alt="Loz Town Patrol">
      </a>
      <button type="button" class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
        <span class="icon-open" aria-hidden="true"><i class="fa-solid fa-bars"></i></span>
        <span class="icon-close" aria-hidden="true"><i class="fa-solid fa-xmark"></i></span>
      </button>
      <nav>
        <ul>
          <li><a class="active" href="index.html">Accueil</a></li>
          <li><a href="events.html">Événements</a></li>
          <li><a href="about.html">À propos</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero hero-designed">
    <div class="grain"></div>
    <div class="container hero-inner hero-grid">
  <div class="hero-copy">

    <h1 class="hero-title">
      Vibration <span class="grad-rasta">Massive</span>
    </h1>

    <div class="hero-ctas"> 
      <a href="events.html" class="btn btn-solid">Prochains événements</a>
      <a href="contact.html" class="btn btn-ghost">Booking</a>
    </div>

    <div class="chips chips-show">
      <span class="chip">Roots</span>
      <span class="chip">Dub</span>
      <span class="chip">Steppas</span>
      <span class="chip">Heavy Bass</span>
      <span class="chip">Sound System</span>
      <span class="chip">Vinyl Set</span>
    </div>
  </div>

  
  <div class="hero-visual">
    <div class="vinyl vinyl-lg">
      <div class="label">
        <span class="label-top">Loz Town Patrol</span>
        <span class="label-mid">45 RPM</span>
        <span class="label-bot">Dubwise</span>
      </div>
      <div class="vinyl-grooves"></div>
      <div class="vinyl-sheen"></div>
    </div>
  </div>
</div>

  </section>

  <section class="events events-designed">
    <div class="container">
      <h2 class="section-title">Prochains événements</h2>

      <div id="home-events-list" class="event-list flyers">
        <!-- Injecté dynamiquement par js/home-events.js -->
      </div>
    </div>
  </section>

  <section class="slider-wrap slider-designed">
    <div class="container">
      <h2 class="section-title">Nos soirées en images</h2>

      <div class="slider">
        <div class="slides">

          <div class="slide" style="background-image:url('https://via.placeholder.com/1600x900');"></div>
          <div class="slide" style="background-image:url('https://via.placeholder.com/1600x900');"></div>
          <div class="slide" style="background-image:url('https://via.placeholder.com/1600x900');"></div>
          <div class="slide" style="background-image:url('https://via.placeholder.com/1600x900');"></div>
        </div>

        <div class="slider-nav">
          <button class="active" data-index="0"></button>
          <button data-index="1"></button>
          <button data-index="2"></button>
          <button data-index="3"></button>
        </div>

        <div class="slide-arrows">
          <button class="arrow prev" aria-label="Précédent">&lt;</button>
          <button class="arrow next" aria-label="Suivant">&gt;</button>
        </div>
      </div>
    </div>
  </section>


  <footer>
    <div class="container foot">
      <div class="social" style="justify-content:center; margin-bottom:8px;">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-soundcloud"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
      </div>
      <p>&copy; 2025 Loz Town Patrol — Tous droits réservés.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="js/home-events.js"></script>
</body>
</html>
