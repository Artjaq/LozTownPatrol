<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loz Town Patrol — En construction</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      display:grid; place-items:center;
      text-align:center;
      padding: clamp(40px, 8vw, 120px);
    }
    .logo-large{
      width: clamp(240px, 40vw, 480px);
      max-width: 100%;
    }
    .under-title{
      margin-top: 28px;
      font-size: clamp(28px, 6vw, 52px);
      text-transform: uppercase;
      letter-spacing:.6px;
    }
    .strip{
      height:8px; margin: 20px auto; border-radius:6px;
      background:linear-gradient(90deg,var(--green) 0 33.33%,var(--gold) 33.33% 66.66%,var(--red) 66.66% 100%);
      opacity:.85; max-width: 360px;
    }
    .under-sub{
      color:var(--ink-dim);
      font-size:15px;
      max-width:500px;
      margin:0 auto;
    }
  </style>
</head>
<body>
  <img src="image/Text only white SVG.svg" alt="Loz Town Patrol" class="logo-large" />
  <h1 class="under-title">Site en construction</h1>
  <div class="strip"></div>
  <p class="under-sub">Love y'all</p>
</body>
</html>
