<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loz Town Patrol — Événement</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header-glow" id="main-header">
    <div class="container nav">
      <a href="index.html"><img src="image/Text only white SVG.svg" class="logo" alt="Loz Town Patrol"></a>
      <button type="button" class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
        <span class="icon-open" aria-hidden="true"><i class="fa-solid fa-bars"></i></span>
        <span class="icon-close" aria-hidden="true"><i class="fa-solid fa-xmark"></i></span>
      </button>
      <nav>
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a class="active" href="events.html">Événements</a></li>
          <li><a href="about.html">À propos</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Contenu injecté dynamiquement par event-detail.js -->
  <main id="event-detail-root">
    <div class="load-state">
      <div class="load-spinner"></div>
      <p>Chargement…</p>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" aria-modal="true" aria-label="Visualiseur de photo" role="dialog" hidden>
    <button class="lightbox-close" aria-label="Fermer">&times;</button>
    <img class="lightbox-img" src="" alt="">
  </div>

  <footer>
    <div class="container foot">
      <div class="social" style="justify-content:center; margin-bottom:8px;">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-soundcloud"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
      </div>
      <p>&copy; 2025 Loz Town Patrol — Tous droits réservés.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="js/event-detail.js"></script>

</html>
