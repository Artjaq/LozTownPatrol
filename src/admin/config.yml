# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Artjaq/LozTownPatrol
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/5ceb32db-242e-4824-94bf-76d8d903a431/pkce
  auth_token_endpoint: /sites/5ceb32db-242e-4824-94bf-76d8d903a431/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://loztownpatrol.netlify.app

# Dossier de stockage des médias uploadés via le CMS
media_folder: "src/uploads"
public_folder: "/uploads"

# Collection événements — seule collection éditable via le CMS
collections:
  - name: "events"
    label: "Événements"
    label_singular: "Événement"
    folder: "src/events"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: "Titre"
        name: "titre"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        time_format: false
      - label: "Lieu"
        name: "lieu"
        widget: "string"
      - label: "Heure"
        name: "heure"
        widget: "string"
        required: false
        hint: "Ex : 21h00"
      - label: "Image principale"
        name: "image_principale"
        widget: "image"
        required: false
      - label: "Photos"
        name: "photos"
        widget: "list"
        required: false
        field:
          label: "Photo"
          name: "photo"
          widget: "image"
      - label: "Vidéos YouTube"
        name: "videos_youtube"
        widget: "list"
        required: false
        field:
          label: "URL YouTube"
          name: "url"
          widget: "string"
          hint: "Ex : https://www.youtube.com/watch?v=XXXX"
      - label: "Publié"
        name: "publie"
        widget: "boolean"
        default: true
      - label: "Description"
        name: "body"
        widget: "markdown"
